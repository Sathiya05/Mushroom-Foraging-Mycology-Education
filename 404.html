<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MycoSpore | 404 - Page Not Found</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#C65D3B',    /* Rust Orange */
                        secondary: '#6C7A4E',  /* Olive Green */
                        darkbg: '#1A1A1A',     /* Soft Black */
                        lightbg: '#F7F5F0',    /* Earthy Off-White */
                    },
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        sans: ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Lato', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-serif {
            font-family: 'Lora', serif;
        }
        
        /* Subtle floating animation for the 404 text */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="antialiased bg-[#1A1A1A] transition-colors duration-500 relative min-h-screen flex flex-col overflow-hidden">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <img src="images\img13.avif" alt="Foggy Forest" class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-luminosity">
        <div class="absolute inset-0 bg-black/20"></div>
        
        <div class="absolute top-1/3 start-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#6C7A4E]/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 start-1/4 w-[400px] h-[400px] bg-[#C65D3B]/10 rounded-full blur-[100px]"></div>
    </div>


    <main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 text-center">
        
        <div class="max-w-2xl mx-auto">
            
            <div class="w-20 h-20 mx-auto rounded-full bg-[#242424]/80 backdrop-blur-md border border-[#C65D3B]/30 flex items-center justify-center mb-8 shadow-[0_0_30px_rgba(198,93,59,0.15)] animate-float">
                <i class="fas fa-compass text-4xl text-[#C65D3B]"></i>
            </div>

            <h1 class="text-8xl md:text-9xl font-serif font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500 mb-4 tracking-tighter drop-shadow-2xl">
                404
            </h1>

            <span class="text-xs font-bold uppercase tracking-[0.2em] text-[#6C7A4E] mb-4 block">Unknown Territory</span>
            
            <h2 class="text-3xl md:text-4xl font-serif font-bold text-white mb-6 leading-tight">
                Looks like you've wandered <br class="hidden sm:block"> off the trail.
            </h2>

            <p class="text-lg text-gray-400 mb-10 leading-relaxed font-medium">
                The page you are looking for has been moved, deleted, or is just hiding deep under the leaf litter. Let's get you back to familiar grounds.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-8 py-4 bg-[#C65D3B] text-white rounded-xl font-bold text-[13px] uppercase tracking-widest hover:bg-[#6C7A4E] hover:-translate-y-1 shadow-lg shadow-[#C65D3B]/20 transition-all flex items-center justify-center gap-2 group">
                    <i class="fas fa-home"></i> Return to Home
                </a>
                <a href="courses.html" class="w-full sm:w-auto px-8 py-4 bg-[#242424]/80 backdrop-blur-md border border-[#6C7A4E]/30 text-white rounded-xl font-bold text-[13px] uppercase tracking-widest hover:border-[#6C7A4E] hover:bg-[#6C7A4E]/10 hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-map text-[#6C7A4E]"></i> Browse Field Guides
                </a>
            </div>

        </div>
    </main>

    <footer class="relative z-10 w-full p-6 text-center">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest">
            &copy; 2026 MycoSpore Education. All rights reserved.
        </p>
    </footer>

    <script>
        document.documentElement.classList.add('dark');
        localStorage.setItem('myco-dark', 'true');
    </script>

</body>
</html>
