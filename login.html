<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="tailwind.js"></script>
          <link rel="icon" href="images\logo.jpeg">


    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#C65D3B',    /* Rust Orange */
                        secondary: '#6C7A4E',  /* Olive Green */
                        darkbg: '#1A1A1A',     /* Soft Black */
                        lightbg: '#F7F5F0',    /* Earthy Off-White */
                    },
                    fontFamily: {
                        serif: ['Lora', 'serif'],
                        sans: ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Lato', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-serif {
            font-family: 'Lora', serif;
        }
        /* Custom Checkbox */
        .myco-checkbox:checked {
            background-color: #6C7A4E;
            border-color: #6C7A4E;
        }
    </style>
</head>

<body class="antialiased bg-[#F7F5F0] dark:bg-[#1A1A1A] transition-colors duration-500 relative min-h-screen overflow-x-hidden">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <img src="https://images.unsplash.com/photo-1611078709320-eb417e2f5b6d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Forest Background" class="absolute inset-0 w-full h-full object-cover opacity-20 dark:opacity-40">
        <div class="absolute inset-0 bg-[#F7F5F0]/80 dark:bg-[#1A1A1A]/80 backdrop-blur-sm"></div>
        
        <div class="absolute top-1/2 start-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-[#6C7A4E]/20 rounded-full blur-[100px]"></div>
        <div class="absolute top-1/2 start-1/4 -translate-y-1/2 w-[300px] h-[300px] bg-[#C65D3B]/10 rounded-full blur-[80px]"></div>
    </div>

    <div class="fixed top-6 start-6 z-50 flex items-center gap-4">
        
        <a href="index.html" class="flex items-center gap-3 group shrink-0 z-[60]">
        <div class="w-1.5 h-10 bg-[#C65D3B] rounded-full group-hover:bg-[#6C7A4E] transition-colors duration-300"></div>
        <div class="flex flex-col">
          <span class="text-xl font-serif font-black tracking-widest uppercase text-[#1A1A1A] dark:text-[#FFFFFF]">
            MYCO<span class="text-[#C65D3B]">SPORE</span>
          </span>
          <span class="text-[9px] tracking-[0.25em] uppercase text-[#6C7A4E] font-bold leading-none mt-1">Foraging & Education</span>
        </div>
      </a>


    </div>

    <div class="fixed top-6 end-6 z-50 flex items-center gap-3">
        <button id="rtlToggle" class="w-10 h-10 rounded-full bg-[#FFFFFF]/60 dark:bg-[#242424]/60 backdrop-blur-md border border-[#6C7A4E]/20 flex items-center justify-center text-[#6C7A4E] hover:border-[#C65D3B] hover:text-[#C65D3B] transition-all shadow-sm" title="Toggle RTL">
            <span class="text-[10px] font-bold">RTL</span>
        </button>
        <button id="themeToggle" class="w-10 h-10 rounded-full bg-[#FFFFFF]/60 dark:bg-[#242424]/60 backdrop-blur-md border border-[#6C7A4E]/20 flex items-center justify-center text-[#6C7A4E] hover:border-[#C65D3B] hover:text-[#C65D3B] transition-all shadow-sm" title="Toggle Theme">
            <i id="themeIcon" class="fas fa-moon text-sm"></i>
        </button>
    </div>


    <div class="relative z-10 min-h-screen w-full flex items-center justify-center px-4 py-32 lg:py-12">
        
        <div class="w-full max-w-md bg-[#FFFFFF] dark:bg-[#242424] rounded-3xl shadow-2xl border border-[#6C7A4E]/20 overflow-hidden p-6 sm:p-8">
            
            <div class="text-center mb-6 border-b border-[#6C7A4E]/10 pb-6">
                <h1 class="text-2xl font-serif font-bold text-[#1A1A1A] dark:text-white">Welcome Back</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Sign in to access your logs and courses.</p>
            </div>

            <form id="loginForm" class="space-y-4">
                
                <div>
                    <label for="email" class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-1.5">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 start-0 ps-4 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400 text-sm"></i>
                        </div>
                        <input type="email" id="email" required placeholder="forager@example.com" 
                            class="w-full ps-11 pe-4 py-3 bg-[#F7F5F0] dark:bg-[#1A1A1A] border border-[#6C7A4E]/20 rounded-xl focus:border-[#C65D3B] focus:ring-2 focus:ring-[#C65D3B]/20 outline-none transition-all text-[#1A1A1A] dark:text-white shadow-inner placeholder-gray-400 text-sm">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-gray-500 dark:text-gray-400">Password</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 start-0 ps-4 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full ps-11 pe-12 py-3 bg-[#F7F5F0] dark:bg-[#1A1A1A] border border-[#6C7A4E]/20 rounded-xl focus:border-[#C65D3B] focus:ring-2 focus:ring-[#C65D3B]/20 outline-none transition-all text-[#1A1A1A] dark:text-white shadow-inner placeholder-gray-400 text-sm">
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 end-0 pe-4 flex items-center text-gray-400 hover:text-[#C65D3B] transition-colors">
                            <i id="eyeIcon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="myco-checkbox w-3.5 h-3.5 rounded border-gray-300 text-[#6C7A4E] focus:ring-[#6C7A4E] transition-colors bg-[#F7F5F0] dark:bg-[#1A1A1A] dark:border-gray-600">
                        <span class="text-xs font-medium text-gray-600 dark:text-gray-400 group-hover:text-[#1A1A1A] dark:group-hover:text-white transition-colors">Remember Me</span>
                    </label>
                    <a href="#" class="text-[10px] font-bold uppercase tracking-widest text-[#C65D3B] hover:text-[#6C7A4E] transition-colors">Forgot?</a>
                </div>

                <button type="submit" class="w-full mt-2 py-3.5 bg-[#C65D3B] text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-[#6C7A4E] shadow-lg shadow-[#C65D3B]/20 transition-all flex items-center justify-center gap-2 group">
                    Log In <i class="fas fa-arrow-right rtl:rotate-180 group-hover:translate-x-1 rtl:group-hover:-translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-3 bg-[#FFFFFF] dark:bg-[#242424] text-gray-400 font-bold uppercase tracking-widest text-[9px]">Or continue with</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-[#F7F5F0] dark:bg-[#1A1A1A] border border-[#6C7A4E]/10 rounded-xl hover:border-[#6C7A4E]/40 hover:shadow-md transition-all text-xs font-bold text-[#1A1A1A] dark:text-white">
                    <i class="fab fa-google text-red-500 text-sm"></i> Google
                </button>
                <button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-[#F7F5F0] dark:bg-[#1A1A1A] border border-[#6C7A4E]/10 rounded-xl hover:border-[#6C7A4E]/40 hover:shadow-md transition-all text-xs font-bold text-[#1A1A1A] dark:text-white">
                    <i class="fab fa-apple text-gray-800 dark:text-white text-sm lg:text-base"></i> Apple
                </button>
            </div>

            <p class="mt-6 text-center text-xs text-gray-600 dark:text-gray-400">
                Don't have a MycoSpore account? 
                <a href="signup.html" class="font-bold text-[#6C7A4E] hover:text-[#C65D3B] border-b border-[#6C7A4E] hover:border-[#C65D3B] transition-all pb-0.5">Signup here</a>
            </p>

        </div>
    </div>

    <script>
        // 1. Password Visibility Toggle
        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        // 2. Dark Mode Toggle
        const htmlElement = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme() {
            let theme = localStorage.getItem('myco-dark') === 'true';
            if (theme) {
                htmlElement.classList.add('dark');
                themeIcon.className = 'fas fa-sun text-yellow-500 text-xs';
            } else {
                htmlElement.classList.remove('dark');
                themeIcon.className = 'fas fa-moon text-xs';
            }
        }

        function toggleTheme() {
            const isDark = htmlElement.classList.toggle('dark');
            localStorage.setItem('myco-dark', isDark);
            applyTheme();
        }

        themeBtn.addEventListener('click', toggleTheme);

        // 3. RTL Toggle Logic
        const rtlBtn = document.getElementById('rtlToggle');
        
        function applyRTL() {
            let isRTL = localStorage.getItem('myco-rtl') === 'true';
            if (isRTL) {
                htmlElement.setAttribute("dir", "rtl");
            } else {
                htmlElement.setAttribute("dir", "ltr");
            }
        }

        function toggleRTL() {
            const currentDir = htmlElement.getAttribute("dir");
            const newDir = currentDir === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", newDir);
            localStorage.setItem("myco-rtl", newDir === "rtl");
        }

        rtlBtn.addEventListener('click', toggleRTL);

        // Initialize Theme & RTL on load
        applyTheme();
        applyRTL();

        // 4. Mock Form Submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Show loading state
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            
            // Simulate network request
            setTimeout(() => {
                window.location.href = 'user.html'; // Redirect to the user dashboard
            }, 1000);
        });
    </script>
</body>
</html>
